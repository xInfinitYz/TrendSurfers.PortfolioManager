name: Bug Report
description: Report a reproducible bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in the title bar or About screen (e.g. 1.0.1)
      placeholder: "1.0.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: e.g. Windows 10 22H2, Windows 11 23H2
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, the app does Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Open the app
        2. Navigate to …
        3. Click …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The app should have done X.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output (if available)
      description: |
        Logs are stored in `%LOCALAPPDATA%\TS.PortfolioManager\logs\`.
        Paste the relevant section below (strip any personal data first).
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else that might help.
